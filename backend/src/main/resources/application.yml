# Common configuration shared by all profiles.
# Environment-specific values (DB connection, secrets) live in
# application-dev.yml / application-prod.yml and are always sourced from env vars.

spring:
  application:
    name: monitoring-dashboard-backend
  profiles:
    active: ${SPRING_PROFILE:dev}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # "metrics" exposed (same as demo-services/*) so the scheduler can poll the
        # backend's own /actuator/metrics/{name} — see V5__seed_self_monitoring.sql.
        include: health, info, metrics
  endpoint:
    health:
      show-details: when-authorized

# Pull-model metric collection interval (see docs/architecture.md).
monitoring:
  poll-interval-ms: 30000

# Retention policy for time-series data (see docs/architecture.md).
# Metriky mají kratší okno než eventy — je jich řádově víc (7 typů na tik schedulera)
# a jednotlivá hodnota má malou informační hodnotu po pár dnech; eventy jsou řídké
# a tvoří čitelnou historii, proto se drží déle.
retention:
  metrics-days: 7
  events-days: 30
  cleanup-cron: "0 0 3 * * *"

# Optional Slack/Discord webhook for alert notifications (see docs/architecture.md).
# URL is secret-like (whoever has it can post to the channel) — env var, never the DB.
webhook:
  url: ${WEBHOOK_URL:}
  format: ${WEBHOOK_FORMAT:slack}

# Optional API key gate for mutating requests (see security/ApiKeyFilter.java).
# Empty disables it — same opt-in-via-env pattern as the webhook above.
security:
  api-key: ${API_KEY:}
