# Production profile placeholder.
# Every value MUST come from environment variables injected at deploy time.
# Never commit real credentials or hosts here.
# ddl-auto is intentionally NOT "update" — schema changes go through Flyway only.

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    com.ondrecreates.monitoringdashboard: INFO
