# demo-service-b — nese /simulate-failure endpoint pro demonstraci alertingu
# (viz FailureSimulationController / FailureSimulationHealthIndicator).

spring:
  application:
    name: demo-service-b

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        # "metrics" exposed so the monitoring backend can poll
        # /actuator/metrics/{name} for CPU/memory data.
        include: health, info, metrics
