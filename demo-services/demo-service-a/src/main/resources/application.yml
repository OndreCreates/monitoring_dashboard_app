# demo-service-a — simuluje normální provoz (stabilní, zdravá služba).
# Health je zatím čistě ze Spring Boot Actuatoru, žádný vlastní controller.

spring:
  application:
    name: demo-service-a

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        # "metrics" exposed so the monitoring backend can poll
        # /actuator/metrics/{name} for CPU/memory data.
        include: health, info, metrics
