services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-monitoring_dashboard}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      # Inside the compose network the DB is reachable by service name, not
      # "localhost" from .env (that value is for running the backend directly
      # on the host machine instead).
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - demo-service-a
      - demo-service-b

  demo-service-a:
    build:
      context: .
      dockerfile: demo-services/demo-service-a/Dockerfile
    ports:
      - "8081:8081"

  demo-service-b:
    build:
      context: .
      dockerfile: demo-services/demo-service-b/Dockerfile
    ports:
      - "8082:8082"

  frontend:
    # Static nginx build, not the Vite dev server — VITE_API_BASE_URL is baked
    # in at build time (see frontend/Dockerfile), not read at container runtime,
    # so no env_file here.
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
