services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-monitoring_dashboard}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - demo-service-a
      - demo-service-b

  demo-service-a:
    build: ./demo-services/demo-service-a
    ports:
      - "8081:8081"

  demo-service-b:
    build: ./demo-services/demo-service-b
    ports:
      - "8082:8082"

  frontend:
    build: ./frontend
    env_file:
      - .env
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
