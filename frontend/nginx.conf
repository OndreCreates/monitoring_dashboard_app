server {
    listen 5173;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — react-router routes like /services must serve index.html
    # on a hard refresh, not a 404 from nginx trying to find that file path.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
